version: '3.8'

services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-barpro}
      POSTGRES_USER: ${DB_USER:-barpro_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-barpro_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - barpro_network

  # Django приложение
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - barpro_network

  # Nginx (опционально, для продакшена)
  # nginx:
  #   image: nginx:alpine
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./staticfiles:/staticfiles:ro
  #     - ./media:/media:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   depends_on:
  #     - web
  #   networks:
  #     - barpro_network

volumes:
  postgres_data:

networks:
  barpro_network:
    driver: bridge
