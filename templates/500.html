<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Ошибка сервера | BarPro</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
        .error-code { font-size: 8rem; font-weight: 800; color: #c8a45a; line-height: 1; }
        .error-message { font-size: 1.5rem; margin: 20px 0; }
        .error-text { color: rgba(255,255,255,0.7); margin-bottom: 30px; }
        .btn { display: inline-block; padding: 14px 32px; background: #c8a45a; color: #fff; border-radius: 12px; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .btn:hover { background: #b08d4a; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div>
        <div class="error-code">500</div>
        <h1 class="error-message">Ошибка сервера</h1>
        <p class="error-text">Что-то пошло не так. Попробуйте обновить страницу или вернитесь позже.</p>
        <a href="/" class="btn">На главную</a>
    </div>
</body>
</html>
